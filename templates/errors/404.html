{% extends "base.html" %}
{% block title %}404 — {{ app_name }}{% endblock %}
{% block content %}
<section class="error-page container">
    <span class="section-label" data-reveal>Signal Lost</span>
    <h1 class="error-code" data-reveal>404</h1>
    <p data-reveal data-reveal-delay="1">This coordinate does not exist in the neural index.</p>
    <a href="{{ url_for('web.index') }}" class="btn btn-primary" data-reveal data-reveal-delay="2">Return to Core</a>
</section>
{% endblock %}
